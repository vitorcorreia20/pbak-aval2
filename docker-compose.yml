version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: trip_requests_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: institutional_trips
      MYSQL_USER: api_user
      MYSQL_PASSWORD: user_password_123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: